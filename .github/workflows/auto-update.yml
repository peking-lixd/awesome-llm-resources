name: Auto Update LLM Resources

on:
  schedule:
    # 每周一 00:00 UTC 更新本周热门
    - cron: '0 0 * * 1'
    # 每月 1 日 00:00 UTC 更新本月热门
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-resources:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run collection script
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      run: |
        python scripts/collect_resources.py
    
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git diff --staged --quiet || git commit -m "🔄 Auto-update: $(date +%Y-%m-%d) [skip ci]"
        git push
